name: Publish to PyPI

on:
  push:
    tags:
      - "v*.*.*"   # trigger on: git tag v0.1.0 && git push --tags

jobs:
  publish:
    name: Publish release
    runs-on: ubuntu-latest
    environment: pypi              # set up trusted publishing in PyPI dashboard
    permissions:
      id-token: write              # required for OIDC trusted publishing

    steps:
      - uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: ">=0.10"

      - name: Set up Python
        run: uv python install

      - name: Build
        run: uv build

      - name: Publish to PyPI (trusted publishing — no API key needed)
        run: uv publish
